name: OPPORTA Approved Source Scan

on:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * 3'  # Weekly Wednesday scan at 04:17 UTC.

permissions:
  contents: read

concurrency:
  group: opporta-approved-source-scan
  cancel-in-progress: false

jobs:
  approved-source-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scan approved public sources
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPPORTA_APPROVED_SCAN_MODE: basic
          OPPORTA_APPROVED_MAX_SOURCES: '25'
          OPPORTA_APPROVED_MAX_FILES: '300'
        run: python approved_source_scanner.py
