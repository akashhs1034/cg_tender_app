name: Build Release AAB

# Manual trigger from the GitHub UI (Actions tab → Build Release AAB → Run workflow).
# Builds the signed Play Store .aab on GitHub's runners (ample RAM + fast network),
# so it never depends on a low-spec local machine. Download the .aab from the run's
# Artifacts when it finishes.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64    base64 of mobile/android/app/upload-keystore.jks
#   KEYSTORE_PASSWORD  the keystore password
#   KEY_PASSWORD       the key password (same as keystore password in our setup)
#   KEY_ALIAS          upload

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.3
          cache: true

      - name: Recreate upload keystore from secret
        working-directory: mobile/android/app
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > upload-keystore.jks

      - name: Write key.properties
        working-directory: mobile/android
        run: |
          {
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"
            echo "storeFile=upload-keystore.jks"
          } > key.properties

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Build release App Bundle
        working-directory: mobile
        run: flutter build appbundle --release

      - name: Upload .aab artifact
        uses: actions/upload-artifact@v4
        with:
          name: opporta-release-aab
          path: |
            mobile/build/**/app-release.aab
          if-no-files-found: error
          retention-days: 14
