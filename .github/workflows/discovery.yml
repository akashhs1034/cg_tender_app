name: OPPORTA Discovery Scan

on:
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * 0'  # Weekly Sunday scan at 03:23 UTC.

permissions:
  contents: read

concurrency:
  group: opporta-discovery-scan
  cancel-in-progress: false

jobs:
  discovery:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bounded discovery scan
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPPORTA_DISCOVERY_MODE: basic
          OPPORTA_DISCOVERY_MAX_SOURCES: '30'
          OPPORTA_DISCOVERY_MAX_LINKS: '500'
        run: python source_discovery.py
