name: 24-7 Automated Data Pipeline Engine

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: 

jobs:
  execute-etl-matrix:
    runs-on: ubuntu-latest

    steps:
    - name: Check out Repository Codebase
      uses: actions/checkout@v4

    - name: Provision Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Deploy Production System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests beautifulsoup4 google-genai pydantic

    - name: Execute Central Core Master Pipeline
      run: |
        python master_pipeline.py

    - name: Commit and Secure Freshly Scraped Leads Data
      run: |
        git config --global user.name "B2B Automation Bot"
        git config --global user.email "bot@interstateb2b.com"
        git add master_tenders.csv master_jobs.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-Refreshed Interstate Leads Vault [Skip CI]" && git push)
