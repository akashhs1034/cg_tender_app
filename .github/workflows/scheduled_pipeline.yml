name: Opporta 24/7 Cloud Engine

on:
  schedule:
    - cron: '0 */2 * * *' # Runs every 2 hours
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  execute-etl-matrix:
    runs-on: ubuntu-latest

    steps:
    - name: Check out Repository
      uses: actions/checkout@v4

    - name: Provision Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Production Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Master Pipeline
      env:
        # Securely injects your keys without exposing them in the code
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python master_pipeline.py