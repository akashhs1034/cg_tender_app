name: Opporta 24/7 Cloud Engine

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  execute-etl-matrix:
    runs-on: ubuntu-latest

    steps:
    - name: Check out Repository
      uses: actions/checkout@v4

    - name: Provision Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Production Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp beautifulsoup4 supabase

    - name: Execute Master Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python master_pipeline.py || (echo "PIPELINE FAILED: Scraping process exited with error" && exit 1)