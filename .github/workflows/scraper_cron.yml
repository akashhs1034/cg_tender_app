name: Daily Tender Ingestion

on:
  schedule:
    - cron: '0 2 * * *'   # 07:30 IST = 02:00 UTC
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Playwright browsers are not cached by setup-python; cache them manually.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      # Always run: 'playwright install chromium' also pulls the matching
      # chrome-headless-shell build. Skipping it on a cache hit left an older
      # cache without the current headless-shell binary, which made all
      # Playwright job scrapers (up_jobs / upsssc) fail with "Executable
      # doesn't exist". Idempotent + fast when already present.
      - name: Install Playwright browser (chromium + headless shell)
        run: playwright install --with-deps chromium

      - name: Run ingestion pipeline
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL:           ${{ secrets.FROM_EMAIL }}
          APP_URL:              ${{ secrets.APP_URL }}
        run: python ingest.py
